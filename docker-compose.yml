  #   networks:
  #     - core-network

  poste:
    image: analogic/poste.io
    container_name: poste
    hostname: ${POSTE_HOSTNAME}
    restart: unless-stopped
    ports:
      - "${MAIL_SMTP_PORT}:25"
      - "${MAIL_POP3_PORT}:110"
      - "${MAIL_IMAP_PORT}:143"
      - "${MAIL_SMTPS_PORT}:465"
      - "${MAIL_SUBMISSION_PORT}:587"
      - "${MAIL_IMAPS_PORT}:993"
      - "${MAIL_POP3S_PORT}:995"
    environment:
      TZ: ${TZ}
      HTTPS: ${POSTE_HTTPS}
    volumes:
      - ./data/poste:/data
    networks:
      - core-network

  databasus:
    image: databasus/databasus:latest
    container_name: databasus
    restart: unless-stopped
    ports:
      - "${DATABASUS_PORT}:4005"
    environment:
      TZ: ${TZ}
    volumes:
      - ./data/databasus:/backups
    networks:
      - core-network

networks:
  core-network:
    name: core-network
    driver: bridge
