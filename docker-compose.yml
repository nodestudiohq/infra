services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "${NPM_PORT}:81"
      - "${HTTPS_PORT}:443"
    environment:
      TZ: ${TZ}
      DB_SQLITE_FILE: /data/database.sqlite
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt
    networks:
      - core-network

  portainer:
    image: portainer/portainer-ee:2.42.0
    container_name: portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT}:9000"
    environment:
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - core-network

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --innodb-buffer-pool-size=${MARIADB_BUFFER_POOL}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - core-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      TZ: ${TZ}
    volumes:
      - ./data/redis:/data
    networks:
      - core-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      - mariadb
    networks:
      - core-network

  # uptime-kuma:
  #   image: louislam/uptime-kuma:latest
  #   container_name: uptime-kuma
  #   restart: unless-stopped
  #   ports:
  #     - "${UPTIMEKUMA_PORT}:3001"
  #   environment:
  #     TZ: ${TZ}
  #   volumes:
  #     - ./data/uptime-kuma:/app/data
  #   networks:
  #     - core-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT}:8080"
    environment:
      TZ: ${TZ}
      DOZZLE_LEVEL: ${DOZZLE_LEVEL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - core-network

  # netdata:
  #   image: netdata/netdata:latest
